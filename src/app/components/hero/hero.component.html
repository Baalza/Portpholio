<header class="hero" aria-label="Introduction">
  <div class="hero__inner">
    <img
      class="hero__portrait"
      [src]="site.portraitSrc"
      [alt]="site.portraitAlt"
      width="80"
      height="80"
      loading="eager"
      decoding="async"
      sizes="80px"
    />
    <div class="hero__text">
      <h1 class="hero__name">{{ site.photographerName }}</h1>
      <p class="hero__tagline">{{ site.tagline }}</p>
    </div>
  </div>
</header>
